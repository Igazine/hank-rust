<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HAL Wasm Demo</title>
    <style>
        body { font-family: monospace; background: #1a1a1a; color: #00ff00; padding: 2rem; }
        h1 { color: #0088ff; border-bottom: 1px solid #333; padding-bottom: 1rem; }
        #output { background: #000; padding: 1rem; border-radius: 4px; box-shadow: 0 0 20px rgba(0,255,0,0.1); white-space: pre-wrap; }
        .meta { color: #888; font-size: 0.8rem; margin-top: 2rem; }
    </style>
</head>
<body>
    <h1>⛰️🛰️🏆 HAL WebAssembly Demo</h1>
    <pre id="output">System initializing...</pre>

    <script type="module">
        import init, { WasmRunner } from '/pkg/hal.js';

        async function run() {
            const output = document.getElementById('output');
            const log = (msg) => {
                if (output.textContent === 'System initializing...') output.textContent = '';
                output.textContent += msg + '\n';
                console.log(msg);
            };

            // Intercept console.log to show HAL log.print calls on the page
            const originalConsoleLog = console.log;
            console.log = (...args) => {
                const msg = args.join(' ');
                if (output.textContent === 'System initializing...') output.textContent = '';
                output.textContent += msg + '\n';
                originalConsoleLog.apply(console, args);
            };

            try {
                // Initialize the Wasm module
                await init();
                log('[System] Wasm Engine Loaded.');

                // HAL is a synchronous engine, so we must pre-fetch our script resources
                // and provide them synchronously to the Runner.
                const fileCache = new Map();

                log('[Host] Pre-fetching script resources...');
                const demoPath = '/examples/wasm_demo/script.hal';
                const response = await fetch(demoPath);
                if (!response.ok) throw new Error(`Failed to fetch script: ${response.status}`);
                const scriptContent = await response.text();
                
                // Store in our local sync cache
                fileCache.set(demoPath, scriptContent);
                log(`[Host] Cached: ${demoPath}`);

                // 1. Define Host I/O closures for the Wasm module (Synchronous)
                const readFile = (path) => {
                    log(`[Host] Reading from Cache: ${path}`);
                    if (fileCache.has(path)) return fileCache.get(path);
                    throw new Error(`File not in cache: ${path}`);
                };

                const resolvePath = (macroPath, base) => {
                    log(`[Host] Resolving: ${macroPath}`);
                    if (macroPath === 'main.hal') return demoPath;
                    return macroPath;
                };

                // 2. Instantiate the Runner
                const runner = new WasmRunner(readFile, resolvePath);
                
                // 3. Register Standard Library modules (Provided by Rust)
                runner.register_stdlib();
                log('[System] Standard Library Modules registered.');

                // 4. Run!
                log('--- HAL Execution Starting ---');
                const result = runner.run('main.hal');
                log('--- HAL Execution Finished ---');
                log(`[Host] Final Return Value: ${result}`);

            } catch (e) {
                log(`[FATAL ERROR] ${e.message || e}`);
                console.error(e);
            }
        }

        run();
    </script>
    <div class="meta">
        Built with hal-rust v1.0.0 (Wasm Target)
    </div>
</body>
</html>
